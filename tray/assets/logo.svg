<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Badge background -->
  <rect x="2" y="2" width="60" height="60" rx="10" ry="10" fill="#0f172a"/>

  <!-- Top jaw (trapezoid) -->
  <polygon points="10,8 54,8 46,21 18,21" fill="#10b981" opacity="1"/>

  <!-- Bottom jaw (trapezoid, mirrored) -->
  <polygon points="18,43 46,43 54,56 10,56" fill="#10b981" opacity="1"/>

  <!-- Specimen line -->
  <line x1="16" y1="32" x2="48" y2="32" stroke="#f8fafc" stroke-width="3"
        stroke-linecap="round"/>

  <!-- Force peak (waveform triangle) -->
  <polygon points="27,32 32,20 37,32" fill="#f8fafc"/>

  <!-- PMD label -->
  <text x="44" y="59" font-family="Arial,sans-serif" font-size="7"
        font-weight="bold" fill="#10b981" text-anchor="middle">PMD</text>
</svg>