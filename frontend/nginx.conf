# Kiosk frontend (production dist/) served by nginx, with API + WebSocket proxied to the
# Windows-host backend. The backend is NOT containerized (it needs COM ports, USB, and a
# 32-bit Windows DLL bridge), so we reach it via host.docker.internal:8000. On Docker
# Desktop that name resolves automatically; docker-compose also adds it via extra_hosts.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Hashed build assets are immutable — cache hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # REST API -> Windows-host backend (uvicorn :8000)
    location /api/ {
        proxy_pass http://host.docker.internal:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # WebSocket -> Windows-host backend (HTTP/1.1 + Upgrade headers, long-lived)
    location /ws {
        proxy_pass http://host.docker.internal:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # SPA fallback — react-router client-side routes resolve to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
