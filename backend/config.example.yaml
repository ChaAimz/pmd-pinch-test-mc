hardware:
  plc:
    enabled: true
    port: "COM3"
    baud: 38400
    poll_bits: [5, 6, 7]
    poll_interval_ms: 20
    heartbeat_word: 10
    heartbeat_interval_ms: 200
  imada:
    enabled: true
    port: "COM5"
    baud: 19200
    decimal_format: true
    tension_limit_n: 2.0     # warn (MR815) when a TENSION_CHECK sample >= this; null disables
  esp32:
    enabled: true
    port: "COM7"
    baud: 115200
    calibration:
      slope: 0.0123
      offset: -45.0
    clamp_offset_gf: 0.0
  state_timeouts:
    wait_clamp_press_ms: 30000
    wait_clamp_force_ms: 10000
    wait_b5_ms: 30000
    tension_check_ms: 30000
    done_b7_ms: 30000
    tension_start_offset_ms: 50     # ms after MR805 to skip (mechanical travel delay)

mock_mode: true

export:
  # Drive letters to never treat as a flash-drive export target, even if
  # Windows reports them as removable (some permanently-attached USB disks
  # are misreported this way). Example: excluded_drive_letters: ["D"]
  excluded_drive_letters: []

storage:
  db_url: "sqlite:///./../data/pinch.db"
  waveforms_dir: "../data/waveforms"

server:
  host: "127.0.0.1"
  port: 8000
